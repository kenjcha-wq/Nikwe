<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NikWe|智者，人生</title>
    <!-- 环境加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK 引入 - 优化连接策略 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { initializeFirestore, collection, addDoc, onSnapshot, query, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        
        window.FB = { 
            initializeApp, initializeFirestore, collection, addDoc, onSnapshot, 
            query, doc, setDoc, getAuth, signInAnonymously, 
            signInWithCustomToken, onAuthStateChanged 
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&family=Noto+Sans+SC:wght@100;400;900&family=Noto+Serif+SC:wght@400;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Long+Cang&family=JetBrains+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0f172a; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #334155; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        #wallpaper-layer { position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; transition: background-image 1s ease-in-out; }
        #wallpaper-layer::after { content: ""; position: absolute; inset: 0; background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(25px); }

        .brand-logo-text { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; font-size: 8vw; font-weight: 900; color: rgba(255,255,255,0.02); text-transform: uppercase; letter-spacing: -0.02em; text-align: center; }

        .editor-view:empty:before { content: "在此记录思考..."; color: #94a3b8; pointer-events: none; }
        .editor-view h1 { font-size: 2.2em; font-weight: 900; margin: 0.8em 0 0.4em; color: #1e293b; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .editor-view table { border-collapse: collapse; width: 100%; margin: 1em 0; border: 1.5px solid #e2e8f0; }
        .editor-view td { border: 1px solid #e2e8f0; padding: 10px; min-width: 50px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 10px; }

        .tool-btn { 
            height: 32px; min-width: 32px; display: flex; align-items: center; justify-content: center; 
            border-radius: 6px; font-size: 10px; font-weight: 900; color: #475569; transition: 0.2s;
            cursor: pointer; background: rgba(255,255,255,0.98); border: 1px solid #e2e8f0; flex-shrink: 0;
        }
        .tool-btn:hover { background: #1e293b !important; color: #fff !important; }

        .float-dock-btn {
            width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: rgba(255,255,255,0.6); border-radius: 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(12px); position: relative;
        }
        .float-dock-btn:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.12); color: #fff; }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(60px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 40px 100px rgba(15, 23, 42, 0.3); }
        .tile-widget { flex: 1; min-width: 250px; max-width: 320px; height: 160px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.08); display: flex; flex-direction: column; padding: 1.5rem; border-radius: 32px; background: rgba(255, 255, 255, 0.04); color: white; }

        .login-input { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08); color: #fff; @apply w-full h-10 rounded-xl outline-none focus:bg-white/10 transition-all text-center placeholder-white/20 font-bold text-sm tracking-wider; }
        .glass-input { @apply w-full h-10 px-4 bg-slate-900/5 border border-slate-900/10 rounded-xl outline-none focus:bg-white transition-all text-sm font-black; }

        .badge { @apply absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-slate-900/50; }

        @media (max-width: 768px) {
            .glass-panel { width: 100vw !important; height: 100vh !important; border-radius: 0 !important; margin: 0 !important; inset: 0 !important; position: fixed !important; }
            .tile-widget { max-width: 100%; min-width: 100%; height: 130px; }
            .dock-container { bottom: 25px !important; width: 95% !important; }
            .tool-bar-scroll { flex-wrap: nowrap !important; justify-content: flex-start !important; overflow-x: auto !important; padding: 10px !important; height: 120px !important; }
            .mobile-sidebar { position: fixed !important; inset-y: 0 !important; left: 0 !important; width: 85% !important; z-index: 60000 !important; background: #fff !important; box-shadow: 20px 0 50px rgba(0,0,0,0.1); }
        }

        .chat-bubble { @apply p-4 rounded-2xl max-w-[85%] text-xs font-bold leading-relaxed mb-4; }
        .chat-user { @apply self-end bg-slate-800 text-white ml-auto; }
        .chat-target { @apply self-start bg-white border border-slate-900/5 text-slate-800; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const PRESET_WALLS = ["https://images.unsplash.com/photo-1506744038136-46273834b3fb", "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", "https://images.unsplash.com/photo-1501785888041-af3ef285b470", "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"];
        const MOODS = [{ icon: "Focus", color: "#10b981" }, { icon: "Work", color: "#3b82f6" }, { icon: "Creative", color: "#a855f7" }, { icon: "Relax", color: "#f59e0b" }, { icon: "Alert", color: "#ef4444" }];
        const FONTS = [{ label: "思源黑体", value: "Noto Sans SC" }, { label: "思源宋体", value: "Noto Serif SC" }, { label: "马善政楷", value: "Ma Shan Zheng" }, { label: "智莽行书", value: "Zhi Mang Xing" }, { label: "Inter Pro", value: "Inter" }, { label: "JetBrains Mono", value: "JetBrains Mono" }];

        const ICONS = {
            plus: "M12 5v14M5 12h14", close: "M18 6L6 18M6 6l12 12", external: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
            send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z", image: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            link: "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71", table: "M3 3h18v18H3z M3 9h18 M3 15h18",
            trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 1 2-2h4a2 2 0 1 2-2h4a2 2 0 0 1 2 2v2",
            undo: "M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6", redo: "M21 10H11a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6",
            book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15",
            cycle: "M12 2v4 M12 18v4 M12 12m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0",
            eye: "M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0 M12 5c7 0 10 7 10 7s-3 7-10 7s-10-7-10-7s3-7 10-7z",
            engine: "M12 15a3 3 0 100-6 3 3 0 000 6z", lab: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z",
            pin: "M12 2v8m0 0l-4 4m4-4l4 4M5 20h14", bird: "M16 3H8L2 12l6 9h8l6-9-6-9z M2 12h20",
            menu: "M3 12h18M3 6h18M3 18h18", back: "M19 12H5M12 19l-7-7 7-7", lock: "M7 11V7a5 5 0 0110 0v4M5 11h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z",
            quote: "M3 21c3 0 7-1 7-8V5H3v8h4c0 5-4 6-4 6", calendar: "M19 4H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z M16 2v4 M8 2v4 M3 10h18",
            indent: "M10 12h10M10 18h10M10 6h10M3 12l4 4M3 12l4-4", list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01",
            check: "M20 6L9 17l-5-5", upload: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12", alignLeft: "M17 10H3M21 6H3M17 14H3M21 18H3", alignCenter: "M18 10H6M21 6H3M18 14H6M21 18H3", alignRight: "M21 10H7M21 6H3M21 14H7M21 18H3", alignFull: "M21 10H3M21 6H3M21 14H3M21 18H3",
            mail: "M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z M22 6l-10 7L2 6", pen: "M12 20h9 M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"
        };

        const Icon = ({ name, size = 14, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className={className} strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[name] || ICONS.plus} /></svg>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('NikAuth_V200'));
            const [view, setView] = useState(isLoggedIn ? 'desktop' : 'login'); 
            const [time, setTime] = useState('--:--');
            const [date, setDate] = useState('...');
            const [location, setLocation] = useState('定位中...');
            const [weather, setWeather] = useState('...');
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [toast, setToast] = useState("");
            const [activePlugin, setActivePlugin] = useState({ name: 'Nik 互通', type: 'mail' });
            const [showNoteSidebar, setShowNoteSidebar] = useState(window.innerWidth > 768);
            const [showLabSidebar, setShowLabSidebar] = useState(window.innerWidth > 768);
            const [mobileChatActive, setMobileChatActive] = useState(false);
            const [commUnlocked, setCommUnlocked] = useState(false);
            const [commType, setCommType] = useState('personal');

            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('NikWe_Master_Config_V200_Stable') || JSON.stringify({
                username: "智者", wallpaper: PRESET_WALLS[0],
                aiBaseUrl: "https://api.deepseek.com/v1/chat/completions", aiKey: "", aiModel: "deepseek-chat",
                localBaseUrl: "http://localhost:11434/v1/chat/completions", localModel: "llama3",
                mailApi: "", plugins: [], apps: []
            })));

            const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem('NikData_Notes_V200_Stable') || '[{"id":1,"title":"智者指南","content":"","pinned":true}]'));
            const [activeNoteId, setActiveNoteId] = useState(notes[0]?.id || 1);
            const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('NikData_Schedules_V200_Stable') || '[]'));
            const [stickies, setStickies] = useState(() => JSON.parse(localStorage.getItem('NikData_Stickies_V200_Stable') || '[{"id":1,"text":"记录瞬间灵感...","mood":"Focus","linkedTaskId":null,"onTile":true}]'));
            const [contacts, setContacts] = useState(() => JSON.parse(localStorage.getItem('NikData_Contacts_V200_Stable') || JSON.stringify([{ id: 'p1', name: "老张", avatar: "Z", msgs: [], unread: 0 }])));
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('NikData_Groups_V200_Stable') || JSON.stringify([{ id: 'g1', name: "决策群", avatar: "H", msgs: [] }])));
            const [activeTargetId, setActiveTargetId] = useState('p1');
            const [nikEmails, setNikEmails] = useState([]);
            const [aiHistory, setAiHistory] = useState([]);
            
            const [mailCompose, setMailCompose] = useState(false);
            const [mailForm, setMailForm] = useState({ to: "", subject: "", body: "", attachments: [] });

            const editorRef = useRef(null);
            const totalUnread = useMemo(() => contacts.reduce((a,b)=>a+(b.unread||0), 0), [contacts]);

            // Firebase 认证与互通
            const [user, setUser] = useState(null);
            const dbRef = useRef(null);
            const authRef = useRef(null);

            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const cfg = JSON.parse(__firebase_config);
                        const app = FB.initializeApp(cfg);
                        // 终极修复：同时开启长轮询并禁用 Fetch Streams，解决 10s 后端无响应问题
                        dbRef.current = FB.initializeFirestore(app, { 
                            experimentalForceLongPolling: true,
                            useFetchStreams: false 
                        });
                        const auth = FB.getAuth(app);
                        authRef.current = auth;
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await FB.signInWithCustomToken(auth, __initial_auth_token);
                        } else { await FB.signInAnonymously(auth); }
                        FB.onAuthStateChanged(auth, (u) => setUser(u));
                    } catch (err) { console.error("Firebase Init Error:", err); }
                };
                initFirebase();
            }, []);

            useEffect(() => {
                if (!user || !dbRef.current) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'nikwe-default';
                const q = FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'emails');
                const unsubscribe = FB.onSnapshot(q, (snapshot) => {
                    const allMails = snapshot.docs.map(doc => ({id: doc.id, ...doc.data()}));
                    setNikEmails(allMails.filter(m => m.to === config.username || m.from === config.username).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0)));
                }, (err) => {
                    console.log("Waiting for cloud data connection...");
                });
                return () => unsubscribe();
            }, [user, config.username]);

            // 真实定位与天气逻辑
            useEffect(() => {
                const fetchLocation = async () => {
                    try {
                        const r = await fetch('https://ipapi.co/json/');
                        const d = await r.json();
                        if(d.city) {
                            setLocation(d.city.toUpperCase());
                            const wr = await fetch(`https://wttr.in/${d.city}?format=%C+%t`);
                            const wt = await wr.text();
                            setWeather(wt);
                        }
                    } catch (e) { setLocation("NIK NODE"); }
                };
                fetchLocation();
                const timer = setInterval(() => {
                    const now = new Date(); setTime(now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false })); setDate(now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            const upcomingSchedules = useMemo(() => {
                return [...schedules].filter(s => !s.done).sort((a, b) => (a.date + a.time).localeCompare(b.date + b.time)).slice(0, 3);
            }, [schedules]);

            const showFeedback = (msg = "数据已同步") => { setToast(msg); setTimeout(() => setToast(""), 2000); };
            const saveConfig = (next) => { setConfig(next); localStorage.setItem('NikWe_Master_Config_V200_Stable', JSON.stringify(next)); showFeedback(); };
            const saveNotes = (n) => { setNotes(n); localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(n)); showFeedback(); };
            const saveSchedules = (s) => { setSchedules(s); localStorage.setItem('NikData_Schedules_V200_Stable', JSON.stringify(s)); showFeedback(); };
            const saveStickies = (st) => { setStickies(st); localStorage.setItem('NikData_Stickies_V200_Stable', JSON.stringify(st)); showFeedback(); };

            const handleLogin = (e) => {
                e.preventDefault();
                const em = e.target.email.value; const ky = e.target.key.value;
                if (em && ky) { localStorage.setItem('NikAuth_V200', JSON.stringify({ email: em, key: ky })); setIsLoggedIn(true); setView('desktop'); }
            };

            const handleWallUpload = (e) => {
                const f = e.target.files[0]; if(!f) return;
                const r = new FileReader(); r.onload = (v) => saveConfig({...config, wallpaper: v.target.result}); r.readAsDataURL(f);
            };

            const handleSendMsg = () => {
                const i = document.getElementById('human-msg-input'); if(!i || !i.value.trim()) return;
                const m = { id: Date.now(), role: 'user', text: i.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                if (commType === 'personal') setContacts(contacts.map(c => c.id === activeTargetId ? {...c, msgs: [...c.msgs, m]} : c));
                else setGroups(groups.map(g => g.id === activeTargetId ? {...g, msgs: [...g.msgs, m]} : g));
                i.value = ''; showFeedback("消息已发出");
            };

            const clearChat = () => { if (confirm("物理销毁记录？")) { if (commType === 'personal') setContacts(contacts.map(c => c.id === activeTargetId ? {...c, msgs: []} : c)); else setGroups(groups.map(g => g.id === activeTargetId ? {...g, msgs: []} : g)); } };

            const callAiApi = async (userInput) => {
                if (!userInput.trim()) return;
                const newMessage = { role: 'user', text: userInput, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                setAiHistory(prev => [...prev, newMessage]);
                if (!config.aiKey) { setAiHistory(prev => [...prev, { role: 'assistant', text: "请在设置中配置 API KEY。", time: newMessage.time }]); return; }
                try {
                    const response = await fetch(config.aiBaseUrl, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${config.aiKey}` }, body: JSON.stringify({ model: config.aiModel, messages: [{ role: 'user', content: userInput }] }) });
                    const data = await response.json();
                    setAiHistory(prev => [...prev, { role: 'assistant', text: data.choices?.[0]?.message?.content || "API 响应异常", time: newMessage.time }]);
                } catch (e) { setAiHistory(prev => [...prev, { role: 'assistant', text: "连接失败，请检查配置。", time: newMessage.time }]); }
            };

            const handleSendEmail = async () => {
                if (!mailForm.to || !mailForm.subject || !user) return;
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'nikwe-default';
                const newMail = { ...mailForm, from: config.username, date: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), timestamp: Date.now() };
                try {
                    await FB.addDoc(FB.collection(dbRef.current, 'artifacts', appId, 'public', 'data', 'emails'), newMail);
                    setMailForm({ to: "", subject: "", body: "", attachments: [] }); setMailCompose(false); showFeedback("信号已真实送出");
                } catch (e) { showFeedback("发送失败"); }
            };

            const handleMailFile = (e) => {
                const f = e.target.files[0]; if(!f) return;
                const r = new FileReader(); r.onload = (v) => setMailForm({...mailForm, attachments: [...mailForm.attachments, {name: f.name, data: v.target.result, type: f.type}]}); r.readAsDataURL(f);
            };

            const exec = (e, cmd, val = null) => { e.preventDefault(); document.execCommand(cmd, false, val); handleEditorInput(); };
            const handleEditorInput = () => { if (editorRef.current) saveNotes(notes.map(n => n.id === activeNoteId ? {...n, content:editorRef.current.innerHTML} : n)); };

            if (!isLoggedIn) return (
                <div className="fixed inset-0 bg-[#0f172a] flex flex-col items-center justify-center p-6 z-[100000]">
                    <div id="wallpaper-layer" style={{backgroundImage: `url(${PRESET_WALLS[0]})`}}></div>
                    <div className="text-4xl text-white tracking-tighter uppercase font-black mb-1 z-10 text-center">NikWe|智者，人生</div>
                    <div className="text-[8px] uppercase text-yellow-500/40 tracking-[0.6em] mb-10 z-10 font-black">Authorized Only</div>
                    <div className="glass-panel w-full max-w-[280px] p-8 rounded-[40px] text-center relative z-10 font-black" style={{background:'rgba(15,23,42,0.9)', borderColor:'rgba(255,215,0,0.1)'}}>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input name="email" required className="login-input" placeholder="EMAIL" type="email" />
                            <input name="key" required className="login-input" placeholder="KEY" type="password" />
                            <button type="submit" className="w-32 h-10 mx-auto bg-yellow-500 text-black rounded-xl font-bold uppercase shadow-lg active:scale-95 transition-all text-[10px] tracking-widest flex items-center justify-center">Sign In</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="relative h-screen w-full flex flex-col overflow-hidden">
                    <div id="wallpaper-layer" style={{backgroundImage: `url(${config.wallpaper})`}}></div>
                    <div className="brand-logo-text">NikWe|智者，人生</div>

                    {toast && (
                        <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[100000] bg-white/90 backdrop-blur-xl px-6 py-2 rounded-full border border-slate-900/5 shadow-2xl animate-in slide-in-from-top-4 duration-300">
                            <span className="text-[10px] font-black uppercase tracking-widest text-slate-800">{toast}</span>
                        </div>
                    )}

                    {view === 'desktop' && (
                        <header className="fixed top-0 w-full p-4 md:p-10 flex justify-between items-start z-[100] no-print font-black">
                            <div className="flex flex-col gap-1 bg-white/10 backdrop-blur-2xl px-5 py-2.5 rounded-2xl border border-white/10 shadow-sm text-white">
                                <div className="flex items-center gap-2 text-xs md:text-sm"><div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div><span>{location}</span></div>

                                                            <div className="flex justify-between items-center font-black">
                                                                <div className="flex gap-2">
                                                                    <label className="w-10 h-10 rounded-xl bg-white border border-slate-900/5 flex items-center justify-center cursor-pointer text-slate-400 hover:text-slate-800 transition-all"><Icon name="image" size={18}/><input type="file" hidden accept="image/*" onChange={handleMailFile}/></label>
                                                                    <div className="flex gap-2">{mailForm.attachments.map((at,idx)=><div key={idx} className="h-10 px-3 bg-white border border-slate-900/5 rounded-xl flex items-center gap-2 text-[8px] font-black truncate max-w-[100px]">{at.name}</div>)}</div>
                                                                </div>
                                                                <div className="flex gap-2"><button onClick={()=>setMailCompose(false)} className="px-6 py-2.5 rounded-xl text-[10px] font-black border border-slate-900/5">取消</button><button onClick={handleSendEmail} className="px-8 py-2.5 rounded-xl text-[10px] font-black bg-slate-800 text-white shadow-lg">真实投递</button></div>
                                                            </div>
                                                        </div>
                                                    )}
                                                    {nikEmails.map((e, i) => (
                                                        <div key={e.id || i} className="group p-6 hover:bg-slate-50 rounded-3xl transition-all border border-transparent hover:border-slate-900/5 font-black">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div className="text-[10px] font-black uppercase text-slate-400 flex items-center gap-2">From: <span className="text-slate-800">{e.from}</span> <span className="text-slate-200">/</span> To: <span className="text-slate-500">{e.to}</span></div>
                                                                <div className="text-[9px] font-black text-slate-300 uppercase">{e.date}</div>
                                                            </div>
                                                            <div className="text-xl font-black uppercase tracking-tighter mb-3">{e.subject}</div>
                                                            <div className="text-sm leading-relaxed text-slate-600 whitespace-pre-wrap font-black">{e.body}</div>
                                                            {e.attachments && e.attachments.length > 0 && (
                                                                <div className="mt-4 flex flex-wrap gap-2">
                                                                    {e.attachments.map((at, idx) => (
                                                                        <div key={idx} className="p-2 bg-white rounded-xl border border-slate-900/5 shadow-sm">
                                                                            {at.type.includes('image') ? <img src={at.data} className="w-32 h-32 object-cover rounded-lg" /> : <div className="text-[8px] font-black">{at.name}</div>}
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            )}
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        ) : (activePlugin.url && <iframe src={activePlugin.url} className="w-full h-full border-0 rounded-b-[35px]"></iframe>)}
                                    </main>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="fixed inset-0 md:m-auto glass-panel z-[5000] flex flex-col overflow-hidden shadow-2xl md:w-[90vw] md:max-w-[750px] md:h-[80vh] md:rounded-[35px] font-black text-slate-800">
                                <div className="p-8 border-b border-slate-900/5 flex justify-between items-center bg-white shrink-0 font-black"><span className="text-xs uppercase tracking-widest font-black">Configuration Hub</span><div onClick={()=>setView('desktop')} className="cursor-pointer text-slate-800/30 hover:text-red-500 transition-colors font-black"><Icon name="close" size={20} /></div></div>
                                <div className="flex-1 overflow-y-auto p-8 md:p-10 space-y-12 custom-scrollbar font-black">
                                    <section className="grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-6 items-center">
                                        <label className="text-[10px] uppercase opacity-40 font-black tracking-widest">Identity</label>
                                        <input className="glass-input font-black" value={config.username} onChange={e=>saveConfig({...config, username:e.target.value})} placeholder="Set your public identity..." />
                                    </section>
                                    
                                    <section>
                                        <label className="text-[10px] font-black uppercase opacity-40 tracking-widest block mb-6">Environment</label>
                                        <div className="grid grid-cols-5 gap-4">
                                            {PRESET_WALLS.map(w => (
                                                <div key={w} onClick={()=>saveConfig({...config, wallpaper:w})} className={`aspect-video rounded-xl border-2 transition-all cursor-pointer bg-cover bg-center ${config.wallpaper===w?'border-slate-800 scale-95 shadow-xl':'border-transparent opacity-60 hover:opacity-100'}`} style={{backgroundImage:`url(${w})`}}></div>
                                            ))}
                                            <label className="aspect-video rounded-xl border-2 border-dashed border-slate-900/10 flex items-center justify-center cursor-pointer hover:bg-slate-900/5 transition-all text-slate-400">
                                                <Icon name="upload" size={20}/>
                                                <input type="file" hidden accept="image/*" onChange={handleWallUpload} />
                                            </label>
                                        </div>
                                    </section>

                                    <section className="space-y-6">
                                        <label className="text-[10px] font-black uppercase opacity-40 tracking-widest block">Network & API Services</label>
                                        <div className="grid grid-cols-1 gap-5">
                                            {['aiBaseUrl', 'aiKey', 'aiModel', 'localBaseUrl', 'localModel', 'mailApi'].map(k => (
                                                <div key={k} className="grid grid-cols-1 sm:grid-cols-[140px_1fr] gap-4 items-center">
                                                    <span className="text-[10px] opacity-40 uppercase font-black tracking-tighter truncate">{k}</span>
                                                    <input className="glass-input font-black !bg-slate-900/10 !border-slate-900/10" value={config[k]} onChange={e=>saveConfig({...config, [k]:e.target.value})} placeholder={`Input ${k}...`} />
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                </div>
                            </div>
                        )}
                    </main>

                    <div className="fixed right-6 bottom-24 md:right-10 md:bottom-32 w-14 h-14 bg-slate-800 border border-white/20 rounded-full flex items-center justify-center cursor-pointer z-[80000] shadow-2xl active:scale-90 transition-transform no-print font-black" onClick={()=>setIsAiOpen(!isAiOpen)}><div className="w-1.5 h-1.5 bg-white rounded-full animate-pulse font-black"></div></div>
                    {isAiOpen && (
                        <div className={`ai-panel fixed z-[85000] inset-0 md:inset-auto md:top-10 md:bottom-10 md:right-10 md:w-[420px] md:height-auto md:rounded-[35px] transition-all duration-500 bg-white shadow-2xl overflow-hidden flex flex-col font-black`}>
                            <div className="p-6 border-b border-slate-900/5 flex justify-between items-center bg-white shrink-0 font-black text-slate-800 uppercase text-xs"><div>Nik Copilot</div><button onClick={()=>setIsAiOpen(false)} className="w-8 h-8 rounded-full bg-slate-900/5 flex items-center justify-center text-slate-800/30 hover:text-red-500 transition-all font-black"><Icon name="close" size={18}/></button></div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-slate-50 font-black">
                                {aiHistory.map((h, i) => (<div key={i} className={`flex flex-col ${h.role === 'user' ? 'items-end' : 'items-start'}`}><div className={`p-4 rounded-2xl max-w-[90%] text-xs font-bold font-black ${h.role === 'user' ? 'bg-slate-800 text-white shadow-lg' : 'bg-white border border-slate-900/5 text-slate-800 shadow-sm'}`}>{h.text}</div></div>))}
                            </div>
                            <div className="p-4 border-t bg-white pb-10 flex gap-3 font-black">
                                <input id="ai-input" className="flex-1 bg-slate-100 p-4 rounded-2xl outline-none text-xs font-bold font-black" placeholder="指令..." onKeyDown={e=>{if(e.key==='Enter'){callAiApi(e.target.value); e.target.value=''}}} /><button onClick={()=>{const i=document.getElementById('ai-input'); if(i){callAiApi(i.value); i.value=''}}} className="bg-slate-800 text-white p-4 rounded-2xl shadow-lg active:scale-95 font-black"><Icon name="send" size={18}/></button>
                            </div>
                        </div>
                    )}

                    <div className="fixed bottom-0 w-full flex justify-center gap-2 md:gap-10 px-4 md:px-8 pb-8 pt-4 no-print z-[200] font-black">
                        <div className="flex items-center justify-center gap-2 md:gap-6 bg-transparent font-black relative">
                            <div onClick={()=>setView('comm')} className="float-dock-btn"><Icon name="bird" size={20} />{totalUnread > 0 && <span className="badge">{totalUnread}</span>}</div>
                            <div onClick={()=>setView('note')} className="float-dock-btn"><Icon name="book" size={20} /></div>
                            <div onClick={()=>setView('schedule')} className="float-dock-btn"><Icon name="calendar" size={20} /></div>
                            <div onClick={()=>setView('sticky')} className="float-dock-btn"><Icon name="pin" size={20} /></div>
                            <div onClick={()=>setView('lab')} className="float-dock-btn"><Icon name="lab" size={20} /></div>
                            <div onClick={()=>setView('settings')} className="float-dock-btn"><Icon name="engine" size={20} /></div>
                            <div className="relative">
                                {isSearchOpen && (
                                    <div className="absolute bottom-16 right-0 w-[260px] md:w-[320px] glass-panel p-4 rounded-3xl animate-in slide-in-from-bottom-4 duration-300 font-black">
                                        <div className="flex gap-2">
                                            <input autoFocus className="flex-1 bg-slate-900/5 border-0 rounded-xl px-4 text-xs font-black outline-none h-10" placeholder="全局索引指令..." onKeyDown={e=>{if(e.key==='Enter'){showFeedback("索引中..."); setIsSearchOpen(false)}}} />
                                            <button onClick={()=>setIsSearchOpen(false)} className="w-10 h-10 rounded-xl bg-slate-800 text-white flex items-center justify-center active:scale-95 transition-all font-black"><Icon name="close" size={14}/></button>
                                        </div>
                                    </div>
                                )}
                                <div onClick={()=>setIsSearchOpen(!isSearchOpen)} className={`float-dock-btn ${isSearchOpen?'bg-slate-800 text-white':''}`}><Icon name="eye" size={20} /></div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
