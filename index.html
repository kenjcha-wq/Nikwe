<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NikWe - 智者，人生</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;800;900&display=swap');
        
        :root {
            --accent: #2563eb;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
            background: #000; font-family: 'Inter', 'PingFang SC', sans-serif; color: #fff;
            -webkit-tap-highlight-color: transparent;
        }

        /* 动态背景层 */
        #wallpaper-layer {
            position: fixed; inset: 0; background-size: cover; background-position: center;
            transition: background-image 1.2s cubic-bezier(0.4, 0, 0.2, 1); z-index: 0;
            background-color: #111;
        }
        #wallpaper-layer::after { content: ""; position: absolute; inset: 0; background: rgba(0,0,0,0.35); }

        /* 品牌字样 */
        #branding-layer {
            position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
            z-index: 1; pointer-events: none; user-select: none;
        }
        .brand-logo-text { font-size: 15vw; font-weight: 900; color: rgba(255,255,255,0.03); letter-spacing: -0.06em; line-height: 1; }

        /* 状态栏适配 */
        #top-bar { position: fixed; top: 0; width: 100%; padding: calc(env(safe-area-inset-top) + 15px) 25px 0; md:padding: 30px 50px; z-index: 100; pointer-events: none; }
        .top-bar-content { display: flex; justify-content: space-between; align-items: flex-start; pointer-events: auto; }

        /* 中心时间 (精致缩小版) */
        #center-hub {
            position: fixed; top: 32%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; width: 90%; transition: opacity 0.5s ease;
        }
        .clock-display { font-size: 14vw; md:font-size: 7.5rem; font-weight: 100; line-height: 1; letter-spacing: -0.05em; }
        .date-display { margin-top: 5px; font-size: 12px; md:font-size: 14px; color: rgba(255,255,255,0.5); letter-spacing: 0.3em; text-transform: uppercase; }

        /* 底部枢纽适配 */
        #bottom-hub {
            position: fixed; bottom: calc(env(safe-area-inset-bottom) + 15px); left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            z-index: 2000; transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); width: 100%; max-width: 100vw; padding: 0 15px;
        }
        #bottom-hub.hidden { transform: translate(-50%, 300px); opacity: 0; pointer-events: none; }

        .search-pill-box {
            width: 100%; max-width: 400px; background: rgba(255,255,255,0.1); backdrop-filter: blur(40px);
            border-radius: 20px; border: 1px solid var(--glass-border); padding: 2px;
        }
        .search-input { background: transparent; border: none; outline: none; width: 100%; color: white; text-align: center; font-size: 0.85rem; font-weight: 300; padding: 10px 15px; }

        #search-results {
            position: absolute; bottom: calc(100% + 10px); left: 0; width: 100%;
            background: rgba(255,255,255,0.96); backdrop-filter: blur(50px);
            border-radius: 20px; display: none; flex-direction: column;
            overflow-y: auto; box-shadow: 0 20px 80px rgba(0,0,0,0.4); color: #1e293b;
            max-height: 350px; z-index: 2500; border: 1px solid #fff;
        }
        .result-item { padding: 10px 20px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.2s; border-bottom: 1px solid #f1f5f9; }
        .result-item:hover { background: #f1f5f9; }

        /* Dock 栏适配 */
        #dock-bar {
            background: rgba(255,255,255,0.1); padding: 8px 10px; border-radius: 24px;
            display: flex; gap: 6px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(40px); max-width: 100%; overflow-x: auto; scrollbar-width: none;
        }
        .dock-item {
            flex-shrink: 0; width: 48px; height: 48px; md:width: 50px; md:height: 50px;
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; color: #fff;
        }
        .dock-item:hover { background: rgba(255,255,255,0.2); transform: translateY(-5px); }

        /* AI 对话调度中心 (响应式修复：手机端弹出，电脑端侧滑) */
        #ai-chat-panel {
            position: fixed; 
            inset: 10px; top: auto; height: 80vh; 
            md:inset: auto; md:top: 20px; md:bottom: 20px; md:right: 20px; md:width: 380px; md:height: auto;
            border-radius: 35px; background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(60px);
            border: 1px solid white; z-index: 4000; transform: translateY(120%);
            md:transform: translateX(120%);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; overflow: hidden; color: #1e293b;
            box-shadow: 0 -10px 50px rgba(0,0,0,0.1);
            pointer-events: none;
        }
        #ai-chat-panel.active { transform: translateY(0); md:transform: translateX(0); pointer-events: auto; }
        .ai-header { padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; }
        .ai-msg-list { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .ai-bubble { padding: 10px 16px; border-radius: 18px; max-width: 90%; font-size: 13px; line-height: 1.5; word-wrap: break-word; }
        .ai-bubble.user { align-self: flex-end; background: #0f172a; color: white; border-bottom-right-radius: 2px; }
        .ai-bubble.bot { align-self: flex-start; background: #f1f5f9; color: #334155; border-bottom-left-radius: 2px; }

        /* 应用窗口适配 */
        #app-window {
            position: fixed; inset: 0; margin: auto; width: 100%; height: 100%; 
            md:width: 94vw; md:height: 88vh; md:border-radius: 40px;
            background: #fff; z-index: 1500; opacity: 0; transform: scale(0.96) translateY(50px); 
            pointer-events: none; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1); 
            display: flex; flex-direction: column; overflow: hidden;
        }
        #app-window.active { opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }

        /* 设置面板 UI 加固 */
        #settings-modal {
            position: fixed; inset: 0; z-index: 5000; display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(30px); padding: 15px;
            pointer-events: none;
        }
        #settings-modal.active { display: flex; pointer-events: auto; }
        .settings-card { width: 100%; max-width: 580px; max-height: 85vh; background: #fff; border-radius: 35px; padding: 25px md:40px; overflow-y: auto; position: relative; color: #1e293b; }
        
        .win-close-btn { width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 50%; cursor: pointer; color: #94a3b8; transition: 0.2s; background: #f8fafc; }
        .win-close-btn:hover { background: #fee2e2; color: #ef4444; }

        .config-block { margin-bottom: 15px; padding: 20px; background: #f8fafc; border-radius: 25px; border: 1.5px solid #edf2f7; }
        .block-tag { font-size: 10px; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 6px; }
        
        .form-grid { display: grid; grid-template-columns: 1fr; md:grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-item { display: flex; flex-direction: column; gap: 5px; margin-bottom: 8px; }
        label { font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; margin-left: 2px; }
        
        input { width: 100%; padding: 10px 16px; border-radius: 12px; border: 1.5px solid #eef2f6; outline: none; font-size: 14px; background: #fff; box-sizing: border-box; }
        .btn-black { background: #0f172a; color: #fff; padding: 14px 24px; border-radius: 16px; font-weight: 800; font-size: 14px; cursor: pointer; width: 100%; border: none; }

        /* AI 悬浮球 (物理响应式) */
        #ai-core {
            position: fixed; right: 20px; bottom: 85px; md:right: 40px; md:bottom: 40px;
            width: 52px; height: 52px; border-radius: 50%; background: #000; border: 1.5px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 2500;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .ai-pulse { width: 8px; height: 8px; background: #fff; border-radius: 50%; animation: core-pulse 2s infinite; }
        @keyframes core-pulse { 0% { transform: scale(1); opacity: 0.4; } 70% { transform: scale(1.3); opacity: 1; box-shadow: 0 0 0 15px rgba(255,255,255,0); } 100% { transform: scale(1); opacity: 0.4; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="wallpaper-layer"></div>
    <div id="branding-layer"><div class="brand-logo-text">NikWe</div></div>

    <header id="top-bar">
        <div class="top-bar-content">
            <div class="flex flex-col gap-1">
                <div class="flex items-center gap-2 text-white font-bold">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    <span id="loc-display" class="text-[13px] uppercase">定位探测...</span>
                </div>
                <div id="weather-display" class="text-[9px] text-white/50 font-black uppercase tracking-widest">MATRIX SYNC</div>
            </div>
            <div class="slogan-box text-right hidden sm:block">
                <div class="slogan-cn text-base font-bold">智者，人生</div>
                <div class="slogan-en text-[6px] text-white/30 tracking-[0.4em]">MATRIX HUB</div>
            </div>
        </div>
    </header>

    <div id="center-hub">
        <div class="clock-display" id="clock">00:00</div>
        <div class="date-display text-[12px] md:text-[14px]" id="date-text">...</div>
    </div>

    <!-- AI 智脑悬浮入口 -->
    <div id="ai-core" onclick="toggleAiChat()"><div class="ai-pulse"></div></div>

    <!-- AI 调度面板 -->
    <div id="ai-chat-panel">
        <div class="ai-header">
            <span class="text-[9px] font-black uppercase tracking-[0.4em] text-slate-400">Nik Scheduler</span>
            <div onclick="toggleAiChat()" class="win-close-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
        </div>
        <div id="ai-messages" class="ai-msg-list custom-scrollbar"></div>
        <div class="p-4 border-t flex gap-3 bg-white pb-[calc(1rem+env(safe-area-inset-bottom))]">
            <input type="text" id="ai-user-input" class="flex-grow p-3 bg-slate-50 border-0 outline-none rounded-xl text-xs" placeholder="全域调度或联网对话..." onkeydown="if(event.key==='Enter') matrixInvoke(this.value)">
            <button onclick="matrixInvoke(document.getElementById('ai-user-input').value)" class="p-3 bg-blue-600 text-white rounded-xl active:scale-95 transition-transform"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg></button>
        </div>
    </div>

    <!-- 底部功能枢纽 -->
    <div id="bottom-hub">
        <div class="search-pill-box">
            <input type="text" id="quick-entry" class="search-input" placeholder="全域搜索本地或 Bing..." spellcheck="false" oninput="globalSearch(this.value)" onkeydown="if(event.key==='Enter') handleGlobalSearch(this.value)">
            <div id="search-results" class="custom-scrollbar"></div>
        </div>
        <nav id="dock-bar" class="flex gap-2"></nav>
    </div>

    <!-- 矩阵设置面板 -->
    <div id="settings-modal">
        <div class="settings-card custom-scrollbar">
            <div onclick="toggleSettings()" class="win-close-btn absolute top-5 right-5"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
            <h2 class="text-xl font-black italic text-slate-800 mb-6 text-center tracking-tighter"> 核心配置中心</h2>

            <div class="config-block">
                <div class="block-tag">视觉环境</div>
                <div class="flex gap-3 mb-4 overflow-x-auto pb-1" id="wallpaper-grid"></div>
                <input type="text" id="custom-bg-url" placeholder="自定义背景直链 (HTTPS)">
            </div>

            <div class="config-block">
                <div class="block-tag" style="color:#2563eb">智脑协议 (联网 API 支持)</div>
                <div class="input-item mb-2"><label>API Key</label><input type="password" id="api-key" placeholder="在此填入 sk-..."></div>
                <div class="form-grid">
                    <div class="input-item"><label>BASE URL</label><input type="text" id="base-url" value="https://api.deepseek.com/chat/completions"></div>
                    <div class="input-item"><label>MODEL</label><input type="text" id="model-name" value="deepseek-chat"></div>
                </div>
            </div>

            <div class="config-block">
                <div class="block-tag" style="color:#10b981">矩阵应用</div>
                <div id="app-manager-list" class="mb-4 space-y-2"></div>
                <div class="bg-white p-5 rounded-[20px] border border-slate-200">
                    <div class="form-grid !mb-3">
                        <div class="input-item"><label>显示名称</label><input type="text" id="new-app-name" placeholder="笔记本"></div>
                        <div class="input-item"><label>文件名</label><input type="text" id="new-app-url" placeholder="niknote .html"></div>
                    </div>
                    <div class="input-item mb-4"><label>SVG PATH</label><input type="text" id="new-app-icon" placeholder="M12 3..."></div>
                    <button onclick="addApp()" class="p-3 bg-emerald-600 text-white rounded-xl font-bold w-full text-xs">注入矩阵单元</button>
                </div>
            </div>

            <button onclick="saveAllSettings()" class="btn-black bg-blue-600 shadow-xl py-4 mt-2">保存并重启系统</button>
        </div>
    </div>

    <!-- 系统应用窗体 -->
    <div id="app-window">
        <div class="win-bar">
            <span id="app-title" class="text-[10px] font-black uppercase tracking-[0.4em] text-slate-400">UNIT</span>
            <div onclick="closeApp()" class="win-close-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></div>
        </div>
        <div class="flex-grow bg-white">
            <iframe id="app-iframe" src="about:blank" class="w-full h-full border-0"></iframe>
        </div>
    </div>

    <script>
        const DEFAULTS = {
            apiKey: '', baseUrl: 'https://api.deepseek.com/chat/completions', modelName: 'deepseek-chat', currentWallpaper: 0,
            wallpapers: [
                'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1497215728101-856f4ea42174?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1506318137071-a8e063b4b4bf?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1519681393784-d120267933ba?auto=format&fit=crop&q=80&w=2000',
                'https://images.unsplash.com/photo-1541701494587-cb58502866ab?auto=format&fit=crop&q=80&w=2000'
            ],
            apps: [
                { id: 'note', title: '笔记本', url: 'smart_note.html', icon: 'M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7 M18.375 2.625a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z' },
                { id: 'im', title: '即时通讯', url: 'im.html', icon: 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z' },
                { id: 'cal', title: '日程计划', url: 'calendar.html', icon: 'M3 4h18v18H3z M16 2v4 M8 2v4 M3 10h18' }
            ]
        };

        let sysSettings = JSON.parse(localStorage.getItem('NikWe_Pro_V11')) || DEFAULTS;

        // 【核心 API 调用：支持联网搜索增强】
        async function matrixCallAPI(prompt, systemPrompt = "你是 Nik 智脑。") {
            if(!sysSettings.apiKey) throw new Error("API Key 未配置");
            
            // 联网大模型 Payload 结构 (兼容 OpenAI/DeepSeek 联网模式)
            const payload = {
                model: sysSettings.modelName,
                messages: [
                    { role: "system", content: systemPrompt },
                    { role: "user", content: prompt }
                ],
                // 联网搜索支持预留 (例如某些 API 需要 tools 或 search)
                // 如果你的 API 服务端支持自带联网，以下标准请求通常会被后台自动触发。
                // 某些 API 可能需要 stream: false。
                stream: false
            };

            // 如果使用特定的 Perplexity 或 OpenAI 搜索模型，通常不需要额外 tools
            // 但如果使用的是需要显示调用的工具，此处可以注入 tools: [...]

            const response = await fetch(sysSettings.baseUrl, {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json', 
                    'Authorization': `Bearer ${sysSettings.apiKey}` 
                },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error(`API Error: ${response.status}`);
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // 全域索引算法
        function scanMatrix(val) {
            let res = [];
            sysSettings.apps.forEach(a => { if(a.title.includes(val)) res.push({ type: 'UNIT', title: a.title, url: a.url }); });
            for (let i = 0; i < localStorage.length; i++) {
                const k = localStorage.key(i);
                if (k.startsWith('NikData_') || k.includes('Note_Data') || k.includes('Plan_Data')) {
                    try {
                        const data = JSON.parse(localStorage.getItem(k));
                        if (Array.isArray(data)) {
                            data.filter(item => JSON.stringify(item).includes(val)).forEach(m => {
                                res.push({ type: 'DATA', title: m.title || m.text || '匹配项', url: k.includes('Note') ? 'niknote .html' : 'calendar.html' });
                            });
                        }
                    } catch(e) {}
                }
            }
            return res;
        }

        function globalSearch(val) {
            const results = document.getElementById('search-results');
            if(!val.trim()) { results.style.display = 'none'; return; }
            const hits = scanMatrix(val);
            if(hits.length === 0) { results.style.display = 'none'; return; }
            results.innerHTML = hits.map(h => `<div class="result-item" onclick="openApp('${h.url}','${h.title}')"><span class="text-[9px] opacity-30 mr-2">${h.type}</span><div class="text-sm font-bold truncate">${h.title}</div></div>`).join('');
            results.style.display = 'flex';
        }

        function handleGlobalSearch(val) {
            const results = document.getElementById('search-results');
            if(results.style.display === 'flex' && results.querySelector('.result-item')) {
                results.querySelector('.result-item').click();
            } else {
                window.open('https://www.bing.com/search?q=' + encodeURIComponent(val), '_blank');
            }
            results.style.display = 'none'; document.getElementById('quick-entry').value = '';
        }

        // 【智脑全域调用逻辑】
        async function matrixInvoke(val) {
            if(!val.trim()) return;
            const input = document.getElementById('ai-user-input'); input.value = '';
            appendAiMsg(val, 'user');
            
            const hits = scanMatrix(val).filter(h => h.type === 'DATA');
            if(hits.length > 0) {
                appendAiMsg("我在本地矩阵找到了匹配内容，已为你提取：", "bot");
                hits.slice(0, 2).forEach(h => {
                    const card = document.createElement('div'); card.className = 'p-3 bg-white border border-slate-100 rounded-xl mt-2 cursor-pointer shadow-sm text-xs font-bold';
                    card.innerText = `调用：${h.title}`; card.onclick = () => openApp(h.url, h.title);
                    document.getElementById('ai-messages').appendChild(card);
                });
            } else {
                try {
                    const result = await matrixCallAPI(val);
                    appendAiMsg(result, "bot");
                } catch(e) {
                    appendAiMsg("智脑联网请求失败，请检查 API 设置。", "bot");
                }
            }
        }

        async function updateWeather() {
            try {
                const lR = await fetch('https://ipapi.co/json/'); const lD = await lR.json();
                const city = lD.city || "兰州";
                document.getElementById('loc-display').innerText = `${city} • 中国`;
                if(lD.latitude) {
                    const wR = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lD.latitude}&longitude=${lD.longitude}&current_weather=true`);
                    const wD = await wR.json();
                    const map = { 0: "晴朗", 1: "少云", 2: "多云", 3: "阴天", 45: "雾气", 61: "微雨" };
                    document.getElementById('weather-display').innerText = `${map[wD.current_weather.weathercode] || "同步中"} ${Math.round(wD.current_weather.temperature)}°C SYNCED`;
                }
            } catch (e) { document.getElementById('loc-display').innerText = "离线环境"; }
        }

        function toggleAiChat() { document.getElementById('ai-chat-panel').classList.toggle('active'); }
        function appendAiMsg(t, type) { const list = document.getElementById('ai-messages'); const b = document.createElement('div'); b.className = `ai-bubble ${type}`; b.innerText = t; list.appendChild(b); list.scrollTop = list.scrollHeight; }

        // 【矩阵桥接：响应子应用 AI 请求】
        window.addEventListener('message', async (e) => {
            if (e.data?.type === 'MATRIX_AI_REQUEST') {
                const { requestId, prompt, systemPrompt } = e.data;
                try {
                    const result = await matrixCallAPI(prompt, systemPrompt);
                    e.source.postMessage({ type: 'MATRIX_AI_RESPONSE', requestId, content: result }, e.origin);
                } catch (err) {
                    e.source.postMessage({ type: 'MATRIX_AI_RESPONSE', requestId, error: true, content: err.message }, e.origin);
                }
            }
        });

        const win = document.getElementById('app-window'); const iframe = document.getElementById('app-iframe');
        function openApp(url, title) {
            document.getElementById('app-title').innerText = title; iframe.src = url;
            win.classList.add('active'); document.getElementById('bottom-hub').classList.add('hidden');
            document.getElementById('center-hub').style.opacity = "0";
            document.getElementById('search-results').style.display = 'none';
        }
        function closeApp() {
            win.classList.remove('active'); iframe.src = "about:blank";
            document.getElementById('bottom-hub').classList.remove('hidden'); document.getElementById('center-hub').style.opacity = "1";
        }
        function toggleSettings() { 
            const m = document.getElementById('settings-modal'); m.classList.toggle('active');
            if(m.classList.contains('active')) {
                document.getElementById('api-key').value = sysSettings.apiKey || '';
                document.getElementById('base-url').value = sysSettings.baseUrl;
                document.getElementById('model-name').value = sysSettings.modelName;
                renderAppManager();
            }
        }
        function setWallpaper(idx, customUrl = null) {
            const url = customUrl || sysSettings.wallpapers[idx]; sysSettings.currentWallpaper = idx;
            document.getElementById('wallpaper-layer').style.backgroundImage = `url('${url}')`;
            const container = document.getElementById('wallpaper-grid');
            container.innerHTML = sysSettings.wallpapers.map((url, i) => `<div onclick="setWallpaper(${i})" class="w-12 h-12 rounded-lg cursor-pointer ${sysSettings.currentWallpaper === i ? 'border-2 border-blue-500' : ''}" style="background-image:url('${url}'); background-size:cover;"></div>`).join('');
        }
        function renderDock() {
            const d = document.getElementById('dock-bar');
            d.innerHTML = sysSettings.apps.map(a => `<div class="dock-item" onclick="openApp('${a.url}','${a.title}')"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="${a.icon}"/></svg></div>`).join('') + 
            `<div class="dock-item text-white/30" onclick="toggleSettings()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></div>`;
        }
        function renderAppManager() {
            const list = document.getElementById('app-manager-list');
            list.innerHTML = sysSettings.apps.map((a, i) => `<div class="flex justify-between items-center p-3 bg-white rounded-xl border border-slate-100 shadow-sm"><span class="text-xs font-bold text-slate-700 uppercase tracking-tighter">${a.title}</span><button onclick="removeApp(${i})" class="text-rose-500 font-black uppercase text-[10px]">移除</button></div>`).join('');
        }
        function addApp() {
            const n = document.getElementById('new-app-name').value; const u = document.getElementById('new-app-url').value;
            const i = document.getElementById('new-app-icon').value || 'M4 4h16v16H4z';
            if (!n || !u) return; sysSettings.apps.push({ id: Date.now().toString(), title: n, url: u, icon: i }); renderAppManager();
        }
        function removeApp(idx) { sysSettings.apps.splice(idx, 1); renderAppManager(); }
        function saveAllSettings() {
            sysSettings.apiKey = document.getElementById('api-key').value;
            sysSettings.baseUrl = document.getElementById('base-url').value;
            sysSettings.modelName = document.getElementById('model-name').value;
            localStorage.setItem('NikWe_Pro_V11', JSON.stringify(sysSettings));
            renderDock(); toggleSettings();
        }

        window.onload = () => {
            setWallpaper(sysSettings.currentWallpaper); renderDock(); updateWeather();
            setInterval(() => {
                const now = new Date(); document.getElementById('clock').innerText = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
                document.getElementById('date-text').innerText = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase();
            }, 1000);
        };
    </script>
</body>
</html>
