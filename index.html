<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NikWe|智者，人生</title>
    <!-- 环境加载 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;900&family=Noto+Sans+SC:wght@100;400;900&family=Noto+Serif+SC:wght@400;900&family=Zhi+Mang+Xing&family=Ma+Shan+Zheng&family=Long+Cang&family=JetBrains+Mono&display=swap');
        
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Inter', 'Noto Sans SC', sans-serif; color: #1e293b; -webkit-tap-highlight-color: transparent; overflow: hidden; }
        
        #wallpaper-layer { 
            position: fixed; inset: 0; background-size: cover; background-position: center; z-index: 0; 
            transition: background-image 1s ease-in-out;
        }
        #wallpaper-layer::after { content: ""; position: absolute; inset: 0; background: rgba(0, 0, 0, 0.45); backdrop-filter: blur(25px); }

        .brand-logo-text { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 1; pointer-events: none; font-size: 16vw; font-weight: 900; color: rgba(255,255,255,0.03); text-transform: uppercase; letter-spacing: -0.05em; }

        .editor-view:empty:before { content: "在此记录思考..."; color: #94a3b8; pointer-events: none; }
        .editor-view h1 { font-size: 2.2em; font-weight: 900; margin: 0.8em 0 0.4em; color: #000; border-bottom: 2px solid #f1f5f9; padding-bottom: 8px; }
        .editor-view table { border-collapse: collapse; width: 100%; margin: 1em 0; border: 1.5px solid #e2e8f0; }
        .editor-view td { border: 1px solid #e2e8f0; padding: 10px; min-width: 50px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .tool-btn { 
            height: 32px; min-width: 32px; display: flex; align-items: center; justify-content: center; 
            border-radius: 6px; font-size: 10px; font-weight: 900; color: #000; transition: 0.2s;
            cursor: pointer; background: rgba(255,255,255,0.98); border: 1px solid #e2e8f0; flex-shrink: 0;
        }
        .tool-btn:hover { background: #000 !important; color: #fff !important; }

        .float-dock-btn {
            width: 46px; height: 46px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            color: rgba(255,255,255,0.65); border-radius: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(12px);
        }
        .float-dock-btn:hover { transform: translateY(-5px); background: rgba(255, 255, 255, 0.15); color: #fff; }

        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(60px) saturate(180%); border: 1px solid rgba(255, 255, 255, 0.4); box-shadow: 0 50px 120px rgba(0,0,0,0.5); }
        
        .tile-widget { flex: 1; min-width: 250px; max-width: 320px; height: 160px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; flex-direction: column; padding: 1.5rem; border-radius: 32px; background: rgba(255, 255, 255, 0.05); color: white; }

        .login-input { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; @apply w-full h-10 rounded-xl outline-none focus:bg-white/10 transition-all text-center placeholder-white/20 font-bold text-sm tracking-wider; }

        .badge { @apply absolute -top-1 -right-1 bg-red-500 text-white text-[8px] font-black w-4 h-4 rounded-full flex items-center justify-center border border-black/50; }

        @media (max-width: 768px) {
            .glass-panel { width: 100vw !important; height: 100vh !important; border-radius: 0 !important; margin: 0 !important; inset: 0 !important; position: fixed !important; }
            .tile-widget { max-width: 100%; min-width: 100%; height: 130px; }
            .dock-container { bottom: 25px !important; width: 95% !important; }
            .tool-bar-scroll { flex-wrap: nowrap !important; justify-content: flex-start !important; overflow-x: auto !important; padding: 10px !important; height: 120px !important; }
            .mobile-sidebar { position: fixed !important; inset-y: 0 !important; left: 0 !important; width: 85% !important; z-index: 60000 !important; background: #fff !important; box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const PRESET_WALLS = ["https://images.unsplash.com/photo-1506744038136-46273834b3fb", "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b", "https://images.unsplash.com/photo-1501785888041-af3ef285b470", "https://images.unsplash.com/photo-1470770841072-f978cf4d019e"];
        const MOODS = [{ icon: "Focus", color: "#10b981" }, { icon: "Work", color: "#3b82f6" }, { icon: "Creative", color: "#a855f7" }, { icon: "Relax", color: "#f59e0b" }, { icon: "Alert", color: "#ef4444" }];
        const FONTS = [{ label: "思源黑体", value: "Noto Sans SC" }, { label: "思源宋体", value: "Noto Serif SC" }, { label: "马善政楷", value: "Ma Shan Zheng" }, { label: "智莽行书", value: "Zhi Mang Xing" }, { label: "Inter Pro", value: "Inter" }, { label: "JetBrains Mono", value: "JetBrains Mono" }];

        const ICONS = {
            plus: "M12 5v14M5 12h14", close: "M18 6L6 18M6 6l12 12", external: "M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6 M15 3h6v6 M10 14L21 3",
            send: "M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z", image: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4 M17 8l-5-5-5 5 M12 3v12",
            link: "M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71", table: "M3 3h18v18H3z M3 9h18 M3 15h18",
            trash: "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 1 2-2h4a2 2 0 0 1 2 2v2",
            undo: "M3 10h10a8 8 0 018 8v2M3 10l6 6m-6-6l6-6", redo: "M21 10H11a8 8 0 00-8 8v2M21 10l-6 6m6-6l-6-6",
            book: "M4 19.5A2.5 2.5 0 0 1 6.5 17H20 M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15",
            cycle: "M12 2v4 M12 18v4 M12 12m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0",
            eye: "M12 12m-3 0a3 3 0 1 0 6 0a3 3 0 1 0 -6 0 M12 5c7 0 10 7 10 7s-3 7-10 7s-10-7-10-7s3-7 10-7z",
            engine: "M12 15a3 3 0 100-6 3 3 0 000 6z", lab: "M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71L12 2z",
            pin: "M12 2v8m0 0l-4 4m4-4l4 4M5 20h14", bird: "M16 3H8L2 12l6 9h8l6-9-6-9z M2 12h20",
            menu: "M3 12h18M3 6h18M3 18h18", back: "M19 12H5M12 19l-7-7 7-7", lock: "M7 11V7a5 5 0 0110 0v4M5 11h14a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2z",
            quote: "M3 21c3 0 7-1 7-8V5H3v8h4c0 5-4 6-4 6", calendar: "M19 4H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2z M16 2v4 M8 2v4 M3 10h18",
            indent: "M10 12h10M10 18h10M10 6h10M3 12l4 4M3 12l4-4", list: "M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"
        };

        const Icon = ({ name, size = 14, className = "" }) => (
            <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className={className} strokeLinecap="round" strokeLinejoin="round"><path d={ICONS[name] || ICONS.plus} /></svg>
        );

        const App = () => {
            const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem('NikAuth_V200'));
            const [view, setView] = useState(isLoggedIn ? 'desktop' : 'login'); 
            const [location, setLocation] = useState('定位中...');
            const [weather, setWeather] = useState('...');
            const [time, setTime] = useState('--:--');
            const [date, setDate] = useState('...');
            const [isAiOpen, setIsAiOpen] = useState(false);
            const [isSearchOpen, setIsSearchOpen] = useState(false);
            const [activePlugin, setActivePlugin] = useState({ name: '协作白板', url: 'https://www.excalidraw.com/', type: 'plugin' });
            const [showNoteSidebar, setShowNoteSidebar] = useState(window.innerWidth > 768);
            const [showLabSidebar, setShowLabSidebar] = useState(window.innerWidth > 768);
            const [mobileChatActive, setMobileChatActive] = useState(false);
            const [commUnlocked, setCommUnlocked] = useState(false);
            const [commType, setCommType] = useState('personal');

            const [config, setConfig] = useState(() => JSON.parse(localStorage.getItem('NikWe_Master_Config_V200_Stable') || JSON.stringify({
                username: "智者", wallpaper: PRESET_WALLS[0],
                aiBaseUrl: "https://api.deepseek.com/v1/chat/completions", aiKey: "", aiModel: "deepseek-chat",
                localBaseUrl: "http://localhost:11434/v1/chat/completions", localModel: "llama3",
                mailApi: "", plugins: [], apps: []
            })));

            const [notes, setNotes] = useState(() => JSON.parse(localStorage.getItem('NikData_Notes_V200_Stable') || '[{"id":1,"title":"智者指南","content":"","pinned":true}]'));
            const [activeNoteId, setActiveNoteId] = useState(notes[0]?.id || 1);
            const [schedules, setSchedules] = useState(() => JSON.parse(localStorage.getItem('NikData_Schedules_V200_Stable') || '[]'));
            const [stickies, setStickies] = useState(() => JSON.parse(localStorage.getItem('NikData_Stickies_V200_Stable') || '[{"id":1,"text":"记录瞬间灵感...","mood":"Focus","linkedTaskId":null}]'));
            const [contacts, setContacts] = useState(() => JSON.parse(localStorage.getItem('NikData_Contacts_V200_Stable') || JSON.stringify([{ id: 'p1', name: "项目办-老张", avatar: "Z", msgs: [], unread: 0 }])));
            const [groups, setGroups] = useState(() => JSON.parse(localStorage.getItem('NikData_Groups_V200_Stable') || JSON.stringify([{ id: 'g1', name: "核心决策群", avatar: "H", msgs: [] }])));
            const [activeTargetId, setActiveTargetId] = useState('p1');
            const [realEmails, setRealEmails] = useState([]);
            const [aiHistory, setAiHistory] = useState([]);
            
            const editorRef = useRef(null);
            const totalUnread = useMemo(() => contacts.reduce((a,b)=>a+(b.unread||0), 0), [contacts]);

            const saveConfig = (next) => { setConfig(next); localStorage.setItem('NikWe_Master_Config_V200_Stable', JSON.stringify(next)); };
            const saveNotes = (n) => { setNotes(n); localStorage.setItem('NikData_Notes_V200_Stable', JSON.stringify(n)); };
            const saveSchedules = (s) => { setSchedules(s); localStorage.setItem('NikData_Schedules_V200_Stable', JSON.stringify(s)); };
            const saveStickies = (st) => { setStickies(st); localStorage.setItem('NikData_Stickies_V200_Stable', JSON.stringify(st)); };

            // 日程监控逻辑：匹配时间后 AI 自动通知
            useEffect(() => {
                const timer = setInterval(() => {
                    const now = new Date();
                    const nowD = now.toISOString().split('T')[0];
                    const nowT = now.toTimeString().slice(0, 5);
                    const matched = schedules.filter(s => !s.done && s.date === nowD && s.time === nowT);
                    if (matched.length > 0) {
                        const alertMsg = `[日程提醒]：${matched[0].text}。任务现已到达设定时间。`;
                        if (!aiHistory.find(m => m.text === alertMsg)) {
                            setAiHistory(prev => [{role:'target', text: alertMsg, time: nowT}, ...prev]);
                        }
                    }
                }, 30000);
                return () => clearInterval(timer);
            }, [schedules, aiHistory]);

            const handleLogin = (e) => {
                e.preventDefault();
                const em = e.target.email.value; const ky = e.target.key.value;
                if (em && ky) { localStorage.setItem('NikAuth_V200', JSON.stringify({ email: em, key: ky })); setIsLoggedIn(true); setView('desktop'); }
            };

            const handleWallUpload = (e) => {
                const f = e.target.files[0]; if(!f) return;
                const r = new FileReader(); r.onload = (v) => saveConfig({...config, wallpaper: v.target.result}); r.readAsDataURL(f);
            };

            const handleSendMsg = () => {
                const i = document.getElementById('human-msg-input'); if(!i || !i.value.trim()) return;
                const m = { id: Date.now(), role: 'user', text: i.value, time: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) };
                if (commType === 'personal') setContacts(contacts.map(c => c.id === activeTargetId ? {...c, msgs: [...c.msgs, m]} : c));
                else setGroups(groups.map(g => g.id === activeTargetId ? {...g, msgs: [...g.msgs, m]} : g));
                i.value = '';
            };

            const clearChat = () => {
                if (!confirm("物理销毁记录？")) return;
                if (commType === 'personal') setContacts(contacts.map(c => c.id === activeTargetId ? {...c, msgs: []} : c));
                else setGroups(groups.map(g => g.id === activeTargetId ? {...g, msgs: []} : g));
            };

            const fetchEmails = async () => {
                if (!config.mailApi) return;
                try { const res = await fetch(config.mailApi); const d = await res.json(); setRealEmails(Array.isArray(d) ? d : []); } catch (e) {}
            };

            const exec = (e, cmd, val = null) => { e.preventDefault(); document.execCommand(cmd, false, val); };
            const handleEditorInput = () => { if (editorRef.current) saveNotes(notes.map(n => n.id === activeNoteId ? {...n, content:editorRef.current.innerHTML} : n)); };

            useEffect(() => {
                const f = async () => {
                    try {
                        const r = await fetch('https://ipapi.co/json/'); const d = await r.json();
                        if(d.city) setLocation(d.city.toUpperCase());
                    } catch (e) {}
                }; f();
                const timer = setInterval(() => {
                    const now = new Date(); setTime(now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false })); setDate(now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' }) + ' ' + now.toLocaleDateString('en-US', { weekday: 'long' }).toUpperCase());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            if (!isLoggedIn) return (
                <div className="fixed inset-0 bg-black flex flex-col items-center justify-center p-6 z-[100000]">
                    <div id="wallpaper-layer" style={{backgroundImage: `url(${PRESET_WALLS[0]})`}}></div>
                    <div className="text-4xl text-white tracking-tighter uppercase font-black mb-1 z-10">NikWe</div>
                    <div className="text-[8px] uppercase text-yellow-500/40 tracking-[0.6em] mb-10 z-10 font-black">Authorized Only</div>
                    <div className="glass-panel w-full max-w-[280px] p-8 rounded-[40px] text-center relative z-10 font-black" style={{background:'rgba(12,12,12,0.9)', borderColor:'rgba(255,215,0,0.1)'}}>
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input name="email" required className="login-input" placeholder="EMAIL" type="email" />
                            <input name="key" required className="login-input" placeholder="KEY" type="password" />
                            <button type="submit" className="w-32 h-10 mx-auto bg-yellow-500 text-black rounded-xl font-bold uppercase shadow-lg active:scale-95 transition-all text-[10px] tracking-widest flex items-center justify-center">Sign In</button>
                        </form>
                    </div>
                </div>
            );

            const isDesktop = view === 'desktop';

            return (
                <div className="relative h-screen w-full flex flex-col overflow-hidden">
                    <div id="wallpaper-layer" style={{backgroundImage: `url(${config.wallpaper})`}}></div>
                    <div className="brand-logo-text">NikWe</div>

                    {isDesktop && (
                        <header className="fixed top-0 w-full p-4 md:p-10 flex justify-between items-start z-[100] no-print animate-in fade-in duration-500 font-black">
                            <div className="flex flex-col gap-1 bg-white/10 backdrop-blur-2xl px-5 py-2.5 rounded-2xl border border-white/10 shadow-sm text-white font-black">
                                <div className="flex items-center gap-2 text-xs md:text-sm"><div className="w-1.5 h-1.5 bg-green-500 rounded-full animate-pulse"></div><span>{location}</span></div>
                                <div className="text-[9px] opacity-40 uppercase">{weather}</div>
                            </div>
                            <div className="text-right bg-white/10 backdrop-blur-2xl px-6 py-2.5 rounded-2xl border border-white/10 text-white">
                                <div className="text-xs md:text-sm font-bold tracking-widest uppercase">{config.username}，人生</div>
                                <div className="text-[9px] opacity-40 italic font-black">Nik Master Unit</div>
                            </div>
                        </header>
                    )}

                    {/* 搜索页面 - 缩小比例 */}
                    {isSearchOpen && (
                        <div className="fixed inset-0 z-[70000] bg-black/40 backdrop-blur-3xl flex flex-col items-center justify-center animate-in fade-in duration-300 px-6 font-black">
                            <button onClick={()=>setIsSearchOpen(false)} className="absolute top-10 right-10 w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20 font-black"><Icon name="close" size={20}/></button>
                            <div className="w-full max-w-sm bg-white/10 p-6 rounded-[32px] border border-white/10 shadow-2xl animate-in zoom-in duration-300">
                                <input autoFocus className="w-full bg-transparent border-b-2 border-white/20 outline-none text-lg text-white placeholder-white/20 pb-2 font-black" placeholder="执行指令..." />
                                <div className="mt-4 text-[9px] text-white/20 uppercase tracking-widest text-center">Global Index Node</div>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 relative z-20 overflow-y-auto custom-scrollbar pt-24 pb-32">
                        {isDesktop && (
                            <div className="w-full max-w-6xl mx-auto flex flex-col items-center justify-center min-h-full px-6 font-black animate-in fade-in zoom-in duration-500">
                                <div className="text-center mb-10 md:mb-16">
                                    <div className="clock-display font-thin text-[20vw] md:text-[8.5rem] tracking-tighter leading-none text-white drop-shadow-xl font-black">{time}</div>
                                    <div className="date-display text-[10px] md:text-[13px] text-white/50 tracking-[0.4em] uppercase font-black mt-3">{date}</div>
                                </div>
                                <div className="w-full flex flex-wrap justify-center gap-4 md:gap-8 font-black">
                                    <div onClick={()=>setView('schedule')} className="tile-widget"><div className="flex justify-between items-start mb-2 uppercase opacity-20 text-[9px]">Plans<Icon name="calendar" size={10}/></div><div className="space-y-1 font-black">{schedules.filter(s=>!s.done).slice(0,3).map(t=>(<div key={t.id} className="truncate text-[11px] font-black">• {t.text}</div>))}</div></div>
                                    <div onClick={()=>setView('sticky')} className="tile-widget"><div className="flex justify-between items-start mb-2 uppercase opacity-20 text-[9px]">Stickies<Icon name="pin" size={10}/></div><div className="space-y-1 font-black text-[10px] italic opacity-60 font-black">{stickies.slice(0,3).map(s=>(<div key={s.id} className="truncate">{s.text}</div>))}</div></div>
                                    <div onClick={()=>setView('note')} className="tile-widget"><div className="flex justify-between items-start mb-2 uppercase opacity-20 text-[9px]">Docs<Icon name="book" size={10}/></div><div className="space-y-1 font-black">{notes.slice(0,3).map(n=>(<div key={n.id} className="truncate text-xs font-black">{n.title}</div>))}</div></div>
                                </div>
                            </div>
                        )}

                        {view === 'schedule' && (
                            <div className="fixed inset-0 glass-panel z-[1500] flex flex-col overflow-hidden animate-in fade-in">
                                <header className="h-14 border-b border-black/5 flex items-center justify-between px-6 bg-white shrink-0 font-black">
                                    <div className="flex items-center gap-3"><Icon name="calendar" size={18} /><span>Schedules Hub</span></div>
                                    <button onClick={()=>setView('desktop')} className="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all font-black"><Icon name="close" size={16}/></button>
                                </header>
                                <main className="flex-1 p-6 md:p-10 overflow-y-auto bg-white/20 font-black pb-40">
                                    <div className="max-w-2xl mx-auto space-y-6">
                                        <div className="flex flex-col gap-3 font-black">
                                            <input id="new-task-input" className="glass-input font-black" placeholder="任务内容..." />
                                            <div className="flex gap-2">
                                                <input id="new-task-date" type="date" className="glass-input flex-1 h-10 px-4 font-black" />
                                                <input id="new-task-time" type="time" className="glass-input flex-1 h-10 px-4 font-black" />
                                                <button onClick={()=>{const i=document.getElementById('new-task-input'), d=document.getElementById('new-task-date'), t=document.getElementById('new-task-time'); if(i.value.trim()){saveSchedules([{id:Date.now(), text:i.value, date:d.value, time:t.value, done:false},...schedules]); i.value=''; d.value=''; t.value=''}}} className="w-24 bg-black text-white rounded-xl font-bold text-[10px]">ADD</button>
                                            </div>
                                        </div>
                                        <div className="space-y-3 font-black">{schedules.map(s => {
                                            const isNow = !s.done && s.date === new Date().toISOString().split('T')[0] && s.time === new Date().toTimeString().slice(0, 5);
                                            return (

                            <div className="p-6 border-b border-black/5 flex justify-between items-center bg-white shrink-0 font-black text-black uppercase text-xs"><div>Nik Copilot</div><button onClick={()=>setIsAiOpen(false)} className="w-8 h-8 rounded-full bg-black/5 flex items-center justify-center text-black/30 hover:text-red-500 font-black font-black font-black font-black"><Icon name="close" size={18}/></button></div>
                            <div className="flex-1 overflow-y-auto p-6 space-y-6 custom-scrollbar bg-slate-50 font-black">
                                {aiHistory.map((h, i) => (<div key={i} className={`flex flex-col ${h.role === 'user' ? 'items-end' : 'items-start'}`}><div className={`p-4 rounded-2xl max-w-[90%] text-xs font-bold font-black ${h.role === 'user' ? 'bg-black text-white shadow-lg' : 'bg-white border border-black/5 text-slate-800 shadow-sm font-black'}`}>{h.text}</div></div>))}
                            </div>
                            <div className="p-4 border-t bg-white pb-10 flex gap-3 font-black">
                                <input id="ai-input" className="flex-1 bg-slate-100 p-4 rounded-2xl outline-none text-xs font-bold font-black font-black" placeholder="指令..." onKeyDown={e=>{if(e.key==='Enter'){callAiApi(e.target.value); e.target.value=''}}} /><button onClick={()=>{const i=document.getElementById('ai-input'); if(i){callAiApi(i.value); i.value=''}}} className="bg-black text-white p-4 rounded-2xl shadow-lg active:scale-95 font-black font-black font-black"><Icon name="send" size={18}/></button>
                            </div>
                        </div>
                    )}

                    {/* Dock - 独立悬浮 7 核 */}
                    <div className="fixed bottom-0 w-full flex justify-center gap-2 md:gap-10 px-4 md:px-8 pb-8 pt-4 no-print z-[200] font-black">
                        <div className="flex items-center justify-center gap-2 md:gap-6 bg-transparent font-black font-black font-black font-black">
                            <div onClick={()=>setView('note')} className="float-dock-btn"><Icon name="book" size={20} /></div>
                            <div onClick={()=>setView('schedule')} className="float-dock-btn" title="日程"><Icon name="calendar" size={20} /></div>
                            <div onClick={()=>setView('sticky')} className="float-dock-btn" title="便签"><Icon name="pin" size={20} /></div>
                            <div onClick={()=>setView('comm')} className="float-dock-btn"><Icon name="bird" size={20} />{totalUnread > 0 && <span className="badge">{totalUnread}</span>}</div>
                            <div onClick={()=>setView('lab')} className="float-dock-btn"><Icon name="lab" size={20} /></div>
                            <div onClick={()=>setIsSearchOpen(true)} className="float-dock-btn" title="搜索"><Icon name="eye" size={20} /></div>
                            <div onClick={()=>setView('settings')} className="float-dock-btn"><Icon name="engine" size={20} /></div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
